<div class="flex justify-start">
  <div *ngFor="let item of checkedList; let i= index "  class="flex pb-10 pr-15 pl-15" [ngClass]="['color'+ item.id]">
    <i  class="mr-5 glyphicon"
       [ngClass]="[item.isSelected ? 'glyphicon-check color'+ i : 'glyphicon-unchecked']"
       (click)="setValue(i)">
    </i>
    <div style="font-weight: bold; margin-left: 3px;" [ngClass]="['color'+ item.id]"> {{item.value}}</div>
  </div>
</div>
