
<div class="container-fluid">
    <!-- header -->
    <div class="page-header custom-page-header">
        <h1 *ngIf="!isEditing">{{'task.newTask' | translate }}</h1>
        <h1 *ngIf="isEditing">{{'task.editTask' | translate }}</h1>
    </div>
    <div class="row">
        <form [formGroup]="form">
            <formly-form [model]="model" [fields]="fields" [form]="form"></formly-form>
        </form>
    </div>
    <div class="row">
        <div class="panel panel-default">
            <div class="panel-heading"><strong><em class="fa fa-filter"></em>  
                {{'task.activities' | translate }}</strong>
            </div>
            <div class="panel-body">
                <div class="row">
                    <div class="col-md-12 flex align-center justify-end">
                        <button type="button" class="grm-btn-primary pt-10 pr-15 pb-10 pl-10 mr-10 ml-20 btn-width"  (click)="addActivity(null)">
                            <div class="flex align-center">
                                <span class="pi pi pi-plus mr-10 ml-5"></span>
                                <span> {{'global.actions.add' | translate }}</span>
                            </div>
                        </button>
                    </div>
                </div>
                <div class="row">
                    <p-table [columns]="cols"
                             [value]="activitiesList"
                             [paginator]="false"
                             styleClass="ui-table-trips">
                        <ng-template pTemplate="header" let-columns>
                            <tr>
                                <th style="text-align: center; border-right: 2px solid #efefef;">{{'task.name' | translate}}
                                <th style="text-align: center; border-right: 2px solid #efefef;">{{'task.equipmentType' | translate}}
                                <th style="text-align: center;"></th>
                            </tr>
                        </ng-template>
                        <ng-template pTemplate="body" let-rowData let-columns="columns" >
                            <tr style="border-bottom: solid 2px #efefef" [pSelectableRow]="rowData">
                                <td style="text-align: center;">
                                    <button class="grm-btn-edit mr-15" type="button" (click)="addActivity(rowData)">
                                        <span class="pi pi-pencil mt-5 f-20"></span>
                                    </button>
                                    {{rowData.name}}
                                </td>
                                <td style="text-align: center;">
                                    {{getEquipmentTypesByActivity(rowData)}}
                                </td>
                                <td style="text-align: center;">
                                    <button type="button"(click)="remove(rowData)" class="pull-right btn bg-red-dark mouse-pointer" style="width: 110px;">
                                        <div class="flex align-center">
                                            <span class="pi pi-check-circle text-white"></span>
                                            <span class="text-white ml-5 mr-5">
                                                {{'global.actions.remove' | translate }}
                                            </span>
                                        </div>
                                    </button>
                                </td>
                            </tr>
                        </ng-template>
                    </p-table>
                </div>
                <div class="row">
                    <div class="col-md-12">
                        <div class="flex align-center justify-center  mt-20" >
                            <button type="button" (click)="saveTask()" class="grm-btn-primary pt-10 pr-15 pb-10 pl-10 mr-20 ml-20 btn-width">
                                <div class="flex align-center">
                                    <span class="pi pi-check mr-10 ml-5"></span>
                                    <span>{{'global.actions.save' | translate }}</span>
                                </div>
                            </button>
                            <button type="button" class="grm-btn-default pt-10 pr-15 pb-10 pl-10 mr-20 ml-20 btn-width" (click)="back()">
                                {{'global.actions.back' | translate }}
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <p-confirmDialog [style]="{width: '30vw', fontSize: '15px'}" key="confirm"></p-confirmDialog>
        </div>
    </div>
</div>
<p-toast position="top-right"></p-toast>
<loading-animation *ngIf="isLoading" ></loading-animation>
