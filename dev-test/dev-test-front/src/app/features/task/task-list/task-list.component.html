
<div class="container-fluid">
    <!-- header -->
    <div class="page-header custom-page-header">
        <h1>{{'task.titlePage' | translate }}</h1>
    </div>
    <div class="row">
        <div class="panel panel-default">
            <div class="panel-heading"><strong><em class="fa fa-filter"></em>  {{'task.titleFilter' | translate }}</strong></div>
            <div class="panel-body">
                <div class="row">
                    <form [formGroup]="formFilter">
                        <formly-form [model]="model" [fields]="fields" [form]="formFilter"></formly-form>
                    </form>
                </div>
                <div class="row">
                    <form [formGroup]="formFilter">
                        <div class="col-md-12">
                            <div class="center mt-30">
                                <input type="radio"  class="mr-10 ml-10" value="true" id="activeInput" name="activeInput" formControlName="activeInput">
                                <label class="mr-10 ml-10">{{'task.active' | translate}}</label>
                                <input type="radio"  class="mr-10 ml-10" value="false" id="activeInput" name="activeInput" formControlName="activeInput">
                                <label class="mr-10 ml-10" >{{'task.inactive' | translate}}</label>
                                <input type="radio"  class="mr-10 ml-10" value="" id="activeInput" name="activeInput" formControlName="activeInput">
                                <label class="mr-10 ml-10">{{'task.all' | translate}}</label>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="row">
                    <div class="col-md-12">
                        <div class="flex align-center justify-center  mt-20" >
                            <button type="button" (click)="search()" class="grm-btn-primary pt-10 pr-15 pb-10 pl-10 mr-20 ml-20 btn-width">
                                <div class="flex align-center">
                                    <span class="pi pi-search mr-10 ml-5"></span>
                                    <span>{{'global.actions.search' | translate }}</span>
                                </div>
                            </button>
                            <button type="button" class="grm-btn-primary pt-10 pr-15 pb-10 pl-10 mr-20 ml-20 btn-width"  (click)="create()">
                                <div class="flex align-center">
                                    <span class="pi pi pi-plus mr-20 ml-5"></span>
                                    <span> {{'global.actions.new' | translate }}</span>
                                </div>
                            </button>

                            <button type="button" class="grm-btn-default pt-10 pr-15 pb-10 pl-10 mr-20 ml-20 btn-width" (click)="back()">
                                {{'global.actions.back' | translate }}
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <p-confirmDialog [style]="{width: '30vw', fontSize: '15px'}" key="confirm"></p-confirmDialog>
        </div>
    </div>

    <div class="row">
        <p-table [columns]="cols"
                 [value]="taskList"
                 [paginator]="true"
                 [rows]="10"
				 [showCurrentPageReport]="true"
				 currentPageReportTemplate="{{'global.pagination.showing' | translate}} {first} - {last} {{'global.pagination.of' | translate}} {totalRecords} {{'global.pagination.in_total' | translate}}"
                 totalRecords="totalStageGroup"
				 styleClass="ui-table-trips">
            <ng-template pTemplate="header" let-columns>
                <tr>
					<th [pSortableColumn]="'name'" style="text-align: center; border-right: 2px solid #efefef;">{{'task.name' | translate}} <p-sortIcon></p-sortIcon></th>
					<th [pSortableColumn]="'description'" style="text-align: center; border-right: 2px solid #efefef;">{{'task.description' | translate}} <p-sortIcon></p-sortIcon></th>
                    <th></th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-rowData let-columns="columns" >
                <tr style="border-bottom: solid 2px #efefef">
                    <td>
                        <button class="grm-btn-edit mr-15" type="button" (click)="edit(rowData)">
                            <span class="pi pi-pencil mt-5 f-20"></span>
                        </button>
                        {{rowData.name}}
					</td>
                    <td>
                        {{rowData.description}}
					</td>
                    <td>
                        <button type="button" *ngIf="!rowData.active" (click)="reactivate(rowData.id)" class="pull-right btn bg-green-light mouse-pointer"  style="width: 110px; background-color: #69BE28;">
                            <div class="flex align-center">
                                <span class="pi pi-check-circle text-white"></span>
                                <span class="text-white ml-5 mr-5">
                                    {{'global.actions.reactivate' | translate }}
                                </span>
                            </div>
                        </button>
                        <button type="button" *ngIf="rowData.active" (click)="inactivate(rowData.id)" class="pull-right btn bg-red-dark mouse-pointer" style="width: 110px;">
                            <div class="flex align-center">
                                <span class="pi pi-check-circle text-white"></span>
                                <span class="text-white ml-5 mr-5">
                                    {{'global.actions.inactivate' | translate }}
                                </span>
                            </div>
                        </button>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>
<p-toast position="top-right"></p-toast>
