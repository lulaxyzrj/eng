name: 'Testing Bundle Prod Actions [Manual-03-bundle-prod]'

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform on PROD'
        required: true
        default: 'validate'
        type: choice
        options:
          - validate
          - deploy
          - destroy

env:
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  # Directory containing your databricks.yml
  DAB_DIR: "03-uber-eats-bundles-multi-env"

jobs:
  dab-manager:
    name: 'Action: ${{ github.event.inputs.action }}'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      # ======================================================
      # 1. VALIDATE
      # Runs for 'validate' OR 'deploy' actions.
      # Skipped during 'destroy' to save time.
      # ======================================================
      - name: Validate Bundle
        if: github.event.inputs.action != 'destroy'
        working-directory: ${{ env.DAB_DIR }}
        run: |
          echo "🔍 Validating bundle configuration for PROD..."
          databricks bundle validate -t prod \
            --var="service_principal_id=${{ secrets.ARM_CLIENT_ID }}"

      # ======================================================
      # 2. DEPLOY & RUN
      # Only runs if 'deploy' is selected.
      # 1. Deploys the artifacts.
      # 2. Runs the DLT Pipeline (Production Mode).
      # 3. Starts the Dashboard App.
      # ======================================================
      - name: Deploy & Run Resources
        if: github.event.inputs.action == 'deploy'
        working-directory: ${{ env.DAB_DIR }}
        run: |
          # 1. Deploy the artifacts to the PROD workspace
          echo "🚀 [1/3] Deploying bundle to PROD environment..."
          databricks bundle deploy -t prod \
            --var="service_principal_id=${{ secrets.ARM_CLIENT_ID }}"

          # 2. Start the App first so it is available while the pipeline processes data
          echo "📊 [2/3] Starting/Ensuring Dashboard App is UP..."
          databricks bundle run -t prod ubereats_dashboard \
            --var="service_principal_id=${{ secrets.ARM_CLIENT_ID }}"


         # Activate here if mode not continuos
         # # 3. Trigger the Pipeline last to process the Shadow Traffic batch
         # echo "🌊 [3/3] Triggering Order Status Pipeline update..."
         # databricks bundle run -t prod order_status_pipeline \
         #   --var="service_principal_id=${{ secrets.ARM_CLIENT_ID }}"

      # ======================================================
      # 3. DESTROY
      # Only runs if 'destroy' is selected.
      # Includes --auto-approve to bypass interactive prompts.
      # ======================================================
      - name: Destroy Resources
        if: github.event.inputs.action == 'destroy'
        working-directory: ${{ env.DAB_DIR }}
        run: |
          echo "⚠️  INITIATING DESTRUCTION OF PROD RESOURCES ⚠️"
          
          databricks bundle destroy -t prod \
            --var="service_principal_id=${{ secrets.ARM_CLIENT_ID }}" \
            --auto-approve
            
          echo "✅ Production bundle destroyed successfully."